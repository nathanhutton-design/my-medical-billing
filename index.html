<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Code Explainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="toggleTheme">🌙 Toggle Mode</button>
  <div class="card">
    <h1>Medical Code Explainer</h1>
    <p>Enter a billing code (try 99285)</p>

    <input id="codeInput" type="text" placeholder="Enter code..." />
    <button onclick="explainCode()">Explain</button>

    <div id="result" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
